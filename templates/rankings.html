{% extends "base.html" %}

{% block title %}ICC Rankings{% endblock %}

{% block content %}
<div class="container">
    <section class="mt-3">
        <h1 class="page-title">ICC Rankings</h1>
        <p class="page-subtitle">Latest ICC player and team rankings</p>
    </section>

    <section class="mt-3">
        <div class="tabs">
            <div class="tab active" data-tab="batting" onclick="switchTab('batting')">Batting</div>
            <div class="tab" data-tab="bowling" onclick="switchTab('bowling')">Bowling</div>
            <div class="tab" data-tab="allrounder" onclick="switchTab('allrounder')">All-Rounder</div>
            <div class="tab" data-tab="teams" onclick="switchTab('teams')">Teams</div>
        </div>
    </section>

    <section class="mt-3">
        <div class="format-tabs">
            <div class="tab active" data-format="test" onclick="switchFormat('test')">Test</div>
            <div class="tab" data-format="odi" onclick="switchFormat('odi')">ODI</div>
            <div class="tab" data-format="t20" onclick="switchFormat('t20')">T20</div>
        </div>
    </section>

    <section class="mt-3 mb-4">
        <div id="rankingsContainer">
            <div class="loading-placeholder">
                <p>Loading rankings...</p>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_css %}
<style>
.page-title {
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.page-subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 8px;
}

.format-tabs {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    margin-top: 12px;
}

.ranking-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    transition: all var(--transition-base);
}

.ranking-card:hover {
    border-color: var(--accent-blue);
    transform: translateX(4px);
}

.rank-number {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-yellow);
}

.rank-number.top-3 {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-yellow));
    color: var(--bg-primary);
}

.player-details {
    flex: 1;
}

.player-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
}

.player-country {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.player-rating {
    text-align: right;
}

.rating-value {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-blue);
}

.rating-label {
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
let currentTab = 'batting';
let currentFormat = 'test';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    loadRankings();
}

function switchFormat(format) {
    currentFormat = format;
    document.querySelectorAll('[data-format]').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-format="${format}"]`).classList.add('active');
    loadRankings();
}

async function loadRankings() {
    const container = document.getElementById('rankingsContainer');
    container.innerHTML = '<div class="loading-placeholder"><p>Loading rankings...</p></div>';
    
    try {
        // Example rankings data - replace with actual API call
        const rankings = generateSampleRankings();
        
        container.innerHTML = '';
        rankings.forEach((player, index) => {
            container.innerHTML += createRankingCard(player, index + 1);
        });
    } catch (error) {
        console.error('Error loading rankings:', error);
        container.innerHTML = '<div class="loading-placeholder"><p>Error loading rankings</p></div>';
    }
}

function generateSampleRankings() {
    // Sample data - replace with actual API
    const players = [
        { name: 'Virat Kohli', country: 'India', rating: 887 },
        { name: 'Steve Smith', country: 'Australia', rating: 858 },
        { name: 'Kane Williamson', country: 'New Zealand', rating: 822 },
        { name: 'Joe Root', country: 'England', rating: 810 },
        { name: 'Babar Azam', country: 'Pakistan', rating: 798 },
        { name: 'Rohit Sharma', country: 'India', rating: 785 },
        { name: 'David Warner', country: 'Australia', rating: 772 },
        { name: 'Quinton de Kock', country: 'South Africa', rating: 765 },
        { name: 'Ben Stokes', country: 'England', rating: 753 },
        { name: 'Rishabh Pant', country: 'India', rating: 741 }
    ];
    return players;
}

function createRankingCard(player, rank) {
    const isTop3 = rank <= 3;
    return `
        <div class="ranking-card">
            <div class="rank-number ${isTop3 ? 'top-3' : ''}">
                ${rank}
            </div>
            <div class="player-details">
                <div class="player-name">${player.name}</div>
                <div class="player-country">${player.country}</div>
            </div>
            <div class="player-rating">
                <div class="rating-value">${player.rating}</div>
                <div class="rating-label">Rating</div>
            </div>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', () => {
    loadRankings();
});
</script>
{% endblock %}
