{% extends "base.html" %}

{% block title %}Live Matches{% endblock %}

{% block content %}
<div class="container">
    <section class="mt-3">
        <h1 class="page-title">Live Matches</h1>
        <p class="page-subtitle">Real-time cricket action happening now</p>
    </section>

    <section class="mt-3">
        <div class="tabs">
            <div class="tab active" data-tab="all">All</div>
            <div class="tab" data-tab="international">International</div>
            <div class="tab" data-tab="t20">T20</div>
            <div class="tab" data-tab="odi">ODI</div>
            <div class="tab" data-tab="test">Test</div>
        </div>
    </section>

    <section class="mt-3">
        <div class="matches-container" id="liveMatchesContainer">
            <div class="loading-placeholder">
                <p>Loading live matches...</p>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_css %}
<style>
.page-title {
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.page-subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 8px;
}

.matches-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

@media (min-width: 768px) {
    .matches-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
async function loadLiveMatches() {
    try {
        const response = await fetch('/api/live-matches');
        const data = await response.json();
        
        const container = document.getElementById('liveMatchesContainer');
        container.innerHTML = '';
        
        if (data.data && data.data.length > 0) {
            data.data.forEach(match => {
                container.innerHTML += createMatchCard(match);
            });
        } else {
            container.innerHTML = '<div class="loading-placeholder"><p>No live matches at the moment</p></div>';
        }
    } catch (error) {
        console.error('Error loading live matches:', error);
        document.getElementById('liveMatchesContainer').innerHTML = 
            '<div class="loading-placeholder"><p>Error loading matches. Please try again later.</p></div>';
    }
}

function createMatchCard(match) {
    return `
        <a href="/scorecard/${match.id}" class="match-card" style="text-decoration: none;">
            <div class="match-header">
                <div class="match-type">${match.matchType || 'T20'}</div>
                <div class="match-status live">LIVE</div>
            </div>
            <div class="match-body">
                <div class="teams">
                    <div class="team">
                        <div class="team-info">
                            <div class="team-flag">${match.teamInfo?.[0]?.shortname?.substring(0, 2) || 'T1'}</div>
                            <div>
                                <div class="team-name">${match.teamInfo?.[0]?.shortname || 'Team 1'}</div>
                            </div>
                        </div>
                        <div>
                            <div class="team-score">${match.score?.[0]?.r || '0'}/${match.score?.[0]?.w || '0'}</div>
                            <div class="team-overs">(${match.score?.[0]?.o || '0'} ov)</div>
                        </div>
                    </div>
                    <div class="team">
                        <div class="team-info">
                            <div class="team-flag">${match.teamInfo?.[1]?.shortname?.substring(0, 2) || 'T2'}</div>
                            <div>
                                <div class="team-name">${match.teamInfo?.[1]?.shortname || 'Team 2'}</div>
                            </div>
                        </div>
                        <div>
                            <div class="team-score">${match.score?.[1]?.r || '0'}/${match.score?.[1]?.w || '0'}</div>
                            <div class="team-overs">(${match.score?.[1]?.o || '0'} ov)</div>
                        </div>
                    </div>
                </div>
                ${match.status ? `<div class="mt-2 text-center text-muted" style="font-size: 13px;">${match.status}</div>` : ''}
            </div>
        </a>
    `;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        // Filter matches based on tab (to be implemented with actual API)
    });
});

document.addEventListener('DOMContentLoaded', () => {
    loadLiveMatches();
    setInterval(loadLiveMatches, 30000);
});
</script>
{% endblock %}
